services:
  db:
    image: postgres:17
    container_name: pnw_spirits_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pnwspirits
      POSTGRES_PASSWORD: pnwspirits_pw
      POSTGRES_DB: pnwspirits_local
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: pnw_spirits_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    # command: ["redis-server", "--requirepass", "Pennywise4224!!!"]
    volumes:
      - redisdata:/data
volumes:
  pgdata:
  redisdata:
